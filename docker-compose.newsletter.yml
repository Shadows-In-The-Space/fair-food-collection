services:
  newsletter:
    build:
      context: .
      dockerfile: Dockerfile.newsletter
    container_name: goldencrumb-newsletter
    restart: always
    environment:
      # Container-side path. Must match the right side of the bind-mount below.
      GOLDENCRUMB_DATA_DIR: ${GOLDENCRUMB_DATA_DIR:-/home/sonny/goldencrumb}
    volumes:
      # Source = host path, target = container path (must equal GOLDENCRUMB_DATA_DIR).
      - ${GOLDENCRUMB_DATA_DIR:-/home/sonny/goldencrumb}:${GOLDENCRUMB_DATA_DIR:-/home/sonny/goldencrumb}
    networks:
      - agency-app_app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.newsletter.rule=Host(`newsletter.goldencrumb.shadowsinthe.space`)"
      - "traefik.http.routers.newsletter.entrypoints=web,websecure"
      - "traefik.http.routers.newsletter.tls=true"
      - "traefik.http.routers.newsletter.tls.certresolver=letsencrypt"
      - "traefik.http.services.newsletter.loadbalancer.server.port=3001"

networks:
  agency-app_app-network:
    external: true
